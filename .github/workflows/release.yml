name: Build & Release Apps

on:
  push:
    tags:
      - "V*"
  workflow_dispatch:
    inputs:
      app_filter:
        description: "Comma-separated app names to build (empty = all)"
        type: string
        default: ""
      skip_release:
        description: "Skip GitHub Release upload"
        type: boolean
        default: false

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.26.2"

permissions:
  contents: write

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Build dynamic matrix
        id: build-matrix
        run: |
          FILTER="${{ inputs.app_filter }}"
          if [ -z "$FILTER" ]; then
            MATRIX=$(jq -c '.' default_app_list.json)
          else
            MATRIX=$(jq -c --arg f "$FILTER" '
              [.[] | select(
                ($f | split(",") | map(gsub("^\\s+|\\s+$";"")) | .[]) as $name
                | .name == $name
              )]' default_app_list.json)
          fi
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true
          body: |
            ## Lightweight-apps Releases
            Built with Tauri — ~5MB per app vs ~150MB Electron.

            > **Linux DRM Note:** Spotify and YT Music on Linux do not support Widevine DRM.

  build-cli:
    needs: prepare-matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-env
        with:
          mode: node
      - run: pnpm run cli:build
      - uses: actions/upload-artifact@v6
        with:
          name: lightweight-cli-dist
          path: dist/
          retention-days: 1

  build-app:
    needs: [prepare-matrix, build-cli]
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
        os:
          - runner: ubuntu-22.04
            platform: linux
            rust: stable
          - runner: windows-latest
            platform: windows
            rust: stable-x86_64-msvc
    runs-on: ${{ matrix.os.runner }}
    name: "${{ matrix.app.title }} (${{ matrix.os.platform }})"
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.os.rust }}

      - uses: Swatinem/rust-cache@v2

      - uses: ./.github/actions/setup-env
        with:
          mode: build

      - uses: actions/download-artifact@v7
        with:
          name: lightweight-cli-dist
          path: dist

      - name: Setup mold linker (Linux)
        if: matrix.os.platform == 'linux'
        uses: rui314/setup-mold@v1

      # ── Build: Linux (.deb + .rpm) ──
      - name: Build for Linux
        if: matrix.os.platform == 'linux'
        run: |
          ARGS=("${{ matrix.app.url }}" "--name" "${{ matrix.app.name }}")
          ARGS+=("--identifier" "${{ matrix.app.identifier }}")
          ARGS+=("--width" "${{ matrix.app.width || 1200 }}")
          ARGS+=("--height" "${{ matrix.app.height || 780 }}")

          if [ -n "${{ matrix.app.user_agent }}" ]; then
            ARGS+=("--user-agent" "${{ matrix.app.user_agent }}")
          fi

          # Target strictly restricted to deb and rpm
          node dist/cli.js "${ARGS[@]}" --targets deb,rpm

          mkdir -p output
          for f in *.deb; do [ -f "$f" ] && mv "$f" "output/${{ matrix.app.title }}_$(arch).deb"; done
          for f in *.rpm; do [ -f "$f" ] && mv "$f" "output/${{ matrix.app.title }}_$(arch).rpm"; done

      # ── Build: Windows (.msi x64) ──
      - name: Build for Windows
        if: matrix.os.platform == 'windows'
        shell: pwsh
        run: |
          $args = "${{ matrix.app.url }}", "--name", "${{ matrix.app.title }}"
          $args += "--identifier", "${{ matrix.app.identifier }}"

          if ("${{ matrix.app.user_agent }}" -ne "") {
            $args += "--user-agent", "${{ matrix.app.user_agent }}"
          }

          $args += "--targets", "x64"
          node dist/cli.js $args

          New-Item -Path "output" -ItemType Directory -Force
          Get-ChildItem *.msi | ForEach-Object {
            Move-Item $_.FullName "output\${{ matrix.app.title }}_x64.msi"
          }

      - uses: actions/upload-artifact@v6
        with:
          name: "${{ matrix.app.title }}-${{ matrix.os.platform }}"
          path: output/*
          retention-days: 5

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/') && inputs.skip_release != true
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBody: true
          omitName: true
          artifacts: "output/*"
          token: ${{ secrets.GITHUB_TOKEN }}
